<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuun Synthesizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="editor-section" data-hide-controls>
            <div class="editor-row">
                <button id="play-toggle" class="play-button">&#x25B6;</button>
                <textarea id="expression" rows="1" placeholder="Tuun expression">harmonica(H, 440)</textarea>
                <button id="reset-button" class="reset-button" title="Reset expression">&#x21BA;</button>
            </div>

            <div class="controls">
                <div class="control-group">
                    <label for="sample-rate">Sample Rate:</label>
                    <select id="sample-rate">
                        <option value="22050">22050 Hz</option>
                        <option value="44100" selected>44100 Hz</option>
                        <option value="48000">48000 Hz</option>
                    </select>
                </div>
            </div>

            <div id="error" class="error hidden"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
